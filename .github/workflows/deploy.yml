name: Pipeline CI/CD - CommercialInventory 

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps: 
      - name: 1. Baixar o código fonte
        uses: actions/checkout@v4

      - name: 1.2. Configurar o .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: 1.3. Executar Testes Unitários
        run: dotnet test "Tests/Tests.csproj" -c Release

      - name: 2. Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 3. Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/commercialinventory:latest