name: Pipeline CI/CD - CommercialInventory 

on:
  push:
    branches:
      - main

jobs: # O que vai fazer
  build-and-deploy: # Nome do job
    runs-on: ubuntu-latest

    steps: 
      - name: 1. Baixar o código fonte
        uses: actions/checkout@v4

      - name: 2. Autenticar no Docker GitHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: 3. Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/commercialinventory:latest