apiVersion: apps/v1
kind: Deployment
metadata:
  name: commercialinventory-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-csharp
  template:
    metadata:
      labels:
        app: backend-csharp
    spec:
      containers:
        - name: api-containers
          image: adersonuchoadev/commercialinventory:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"

---

apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: backend-csharp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer